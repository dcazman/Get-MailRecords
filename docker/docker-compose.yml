# Standard setup — works on any machine
services:
  gmr:
    image: dcazman/gmr:latest
    container_name: gmr
    restart: unless-stopped
    ports:
      - "7777:7777"

# ---
# Cloudflare Tunnel setup (host networking)
# Use this if cloudflared is also running in network_mode: host
# and needs to reach GMR via localhost:7777.
# Remove the standard block above and uncomment below:
#
# services:
#   gmr:
#     image: dcazman/gmr:latest
#     container_name: gmr
#     restart: unless-stopped
#     network_mode: host
