name: Publish to PowerShell Gallery
on:
  #push:
  #  tags:
  #    - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get module name and version
        id: module_info
        shell: pwsh
        run: |
          $manifest = Get-ChildItem -Filter *.psd1 | Select-Object -First 1
          $data = Import-PowerShellDataFile $manifest.FullName
          $moduleName = $manifest.BaseName
          $currentVersion = $data.ModuleVersion
          echo "MODULE_NAME=$moduleName" >> $env:GITHUB_OUTPUT
          echo "CURRENT_VERSION=$currentVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Module: $moduleName v$currentVersion"

      - name: Publish to PSGallery
        shell: pwsh
        run: |
          Publish-Module -Path . -NuGetApiKey ${{ secrets.PSGALLERY_API_KEY }} -Repository PSGallery

      - name: Unlist previous versions from PSGallery
        shell: pwsh
        run: |
          $moduleName = "${{ steps.module_info.outputs.MODULE_NAME }}"
          $currentVersion = "${{ steps.module_info.outputs.CURRENT_VERSION }}"
          $apiKey = "${{ secrets.PSGALLERY_API_KEY }}"

          Write-Host "Looking for previous versions of '$moduleName' to unlist..."
          try {
            $allVersions = Find-Module -Name $moduleName -AllVersions -ErrorAction Stop |
              Where-Object { $_.Version -ne $currentVersion } |
              Sort-Object Version -Descending

            if ($allVersions) {
              foreach ($version in $allVersions) {
                Write-Host "Unlisting $moduleName v$($version.Version)..."
                try {
                  $uri = "https://www.powershellgallery.com/api/v2/package/$moduleName/$($version.Version)"
                  Invoke-RestMethod -Uri $uri -Method Delete -Headers @{ "X-NuGet-ApiKey" = $apiKey } -ErrorAction Stop
                  Write-Host "Successfully unlisted v$($version.Version)"
                } catch {
                  Write-Warning "Could not unlist v$($version.Version): $_"
                }
              }
            } else {
              Write-Host "No previous versions found to unlist."
            }
          } catch {
            Write-Warning "Could not retrieve module versions: $_"
          }
